name: Verify VOSTD (Main) with verus-lang/verus

on:
  push:
    branches:
      - main
  issue_comment:
    types: [created]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read
  statuses: write

jobs:
  verify-upstream-verus:
    if: >
      github.event_name != 'issue_comment' ||
      (github.event.issue.pull_request &&
       contains(github.event.comment.body, '/ci-upstream-verus') &&
       contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.comment.author_association))
    runs-on: ubuntu-24.04
    env:
      CARGO_TERM_COLOR: always

    steps:
      - name: Get PR head commit
        id: pr
        if: github.event_name == 'issue_comment'
        uses: actions/github-script@v8
        with:
          script: |
            const { owner, repo } = context.repo;
            const pull_number = context.payload.issue.number;
            const { data: pull } = await github.rest.pulls.get({ owner, repo, pull_number });

            core.setOutput('head_sha', pull.head.sha);

      - name: Mark upstream Verus verification as pending
        if: github.event_name == 'issue_comment'
        continue-on-error: true
        uses: actions/github-script@v8
        with:
          retries: 3
          script: |
            const { owner, repo } = context.repo;
            const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;

            await github.rest.repos.createCommitStatus({
              owner,
              repo,
              sha: '${{ steps.pr.outputs.head_sha }}',
              state: 'pending',
              context: 'ci/upstream-verus',
              description: 'Upstream Verus verification is running',
              target_url: runUrl,
            });

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'issue_comment' && format('refs/pull/{0}/merge', github.event.issue.number) || github.ref }}
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt update -qq
          sudo apt install -y build-essential unzip pkg-config libssl-dev llvm

      - name: Run dv bootstrap with upstream verus
        run: cargo dv bootstrap --upstream-verus

      - name: Verify ostd with upstream verus
        run: make

      - name: Report upstream Verus verification status
        if: always() && github.event_name == 'issue_comment'
        continue-on-error: true
        uses: actions/github-script@v8
        with:
          retries: 3
          script: |
            const { owner, repo } = context.repo;
            const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
            const state = '${{ job.status }}' === 'success' ? 'success' : 'failure';
            const description = state === 'success'
              ? 'Upstream Verus verification passed'
              : 'Upstream Verus verification failed';

            await github.rest.repos.createCommitStatus({
              owner,
              repo,
              sha: '${{ steps.pr.outputs.head_sha }}',
              state,
              context: 'ci/upstream-verus',
              description,
              target_url: runUrl,
            });
